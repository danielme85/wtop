name: Release

on:
  push:
    tags: ["v*"]

permissions:
  contents: write

jobs:
  build-linux:
    strategy:
      matrix:
        include:
          - platform: amd64
            runner: ubuntu-latest
          - platform: arm64
            runner: ubuntu-24.04-arm
    runs-on: ${{ matrix.runner }}
    steps:
      - uses: actions/checkout@v4

      - name: Get short commit hash
        id: git
        run: echo "short_sha=$(git rev-parse --short HEAD)" >> "$GITHUB_OUTPUT"

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build Docker image (${{ matrix.platform }})
        uses: docker/build-push-action@v6
        with:
          context: .
          push: false
          load: true
          tags: wtop:${{ matrix.platform }}
          build-args: |
            GIT_HASH=${{ steps.git.outputs.short_sha }}
            GIT_BRANCH=${{ github.ref_name }}

      - name: Extract binary from image
        run: |
          container_id=$(docker create wtop:${{ matrix.platform }})
          docker cp "$container_id:/usr/local/bin/wtop" ./wtop-linux-${{ matrix.platform }}
          docker rm "$container_id"
          chmod +x ./wtop-linux-${{ matrix.platform }}
          file ./wtop-linux-${{ matrix.platform }}

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: wtop-linux-${{ matrix.platform }}
          path: ./wtop-linux-${{ matrix.platform }}

  build-macos:
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable

      - name: Build release binary
        run: cargo build --release

      - name: Rename binary
        run: |
          cp target/release/wtop ./wtop-darwin-arm64
          chmod +x ./wtop-darwin-arm64
          file ./wtop-darwin-arm64

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: wtop-darwin-arm64
          path: ./wtop-darwin-arm64

  release:
    needs: [build-linux, build-macos]
    runs-on: ubuntu-latest
    steps:
      - name: Download build artifacts
        uses: actions/download-artifact@v4
        with:
          pattern: wtop-*
          path: artifacts

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          generate_release_notes: true
          files: artifacts/wtop-*/wtop-*

  update-homebrew:
    needs: release
    runs-on: ubuntu-latest
    steps:
      - name: Get tag version
        id: tag
        run: echo "version=${GITHUB_REF#refs/tags/v}" >> "$GITHUB_OUTPUT"

      - name: Get tarball SHA256
        id: sha
        run: |
          sha=$(curl -sL "https://github.com/danielme85/wtop/archive/refs/tags/v${{ steps.tag.outputs.version }}.tar.gz" | sha256sum | awk '{print $1}')
          echo "sha256=$sha" >> "$GITHUB_OUTPUT"

      - name: Checkout homebrew-tap
        uses: actions/checkout@v4
        with:
          repository: danielme85/homebrew-tap
          token: ${{ secrets.HOMEBREW_TAP_TOKEN }}

      - name: Update formula
        run: |
          cat > Formula/wtop.rb << 'FORMULA'
          class Wtop < Formula
            desc "A nimble, asynchronous Docker container monitor TUI"
            homepage "https://github.com/danielme85/wtop"
            url "https://github.com/danielme85/wtop/archive/refs/tags/v${{ steps.tag.outputs.version }}.tar.gz"
            sha256 "${{ steps.sha.outputs.sha256 }}"
            license "MIT"

            depends_on "rust" => :build

            def install
              system "cargo", "install", *std_cargo_args
            end

            test do
              assert_match version.to_s, shell_output("#{bin}/wtop --version")
            end
          end
          FORMULA
          # Remove leading whitespace from heredoc
          sed -i 's/^          //' Formula/wtop.rb

      - name: Commit and push
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add Formula/wtop.rb
          git commit -m "Update wtop to v${{ steps.tag.outputs.version }}"
          git push
