name: Build

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

permissions:
  contents: read

jobs:
  build:
    strategy:
      matrix:
        include:
          - platform: amd64
            runner: ubuntu-latest
          - platform: arm64
            runner: ubuntu-24.04-arm
    runs-on: ${{ matrix.runner }}
    steps:
      - uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build Docker image (${{ matrix.platform }})
        uses: docker/build-push-action@v6
        with:
          context: .
          push: false
          load: true
          tags: wtop:${{ matrix.platform }}

      - name: Extract binary from image
        run: |
          container_id=$(docker create wtop:${{ matrix.platform }})
          docker cp "$container_id:/usr/local/bin/wtop" ./wtop-linux-${{ matrix.platform }}
          docker rm "$container_id"
          chmod +x ./wtop-linux-${{ matrix.platform }}
          file ./wtop-linux-${{ matrix.platform }}

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: wtop-linux-${{ matrix.platform }}
          path: ./wtop-linux-${{ matrix.platform }}
